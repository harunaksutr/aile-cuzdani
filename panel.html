        :root {

            --bg-color: #ecf0f1;
            --card-bg: #ffffff;

        body {

            padding: 20px;
            line-height: 1.6;
        }

        .dashboard-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--primary-color);
            font-size: 2.5em;
            margin-bottom: 5px;
        }

        .header p {
            color: #7f8c8d;
            font-size: 1.2em;
        }

        }

        }
